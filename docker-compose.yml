version: '3.8'

# BKTDrive — Production Stack (CasaOS)
# MariaDB & OnlyOffice sudah berjalan di network: bktdrive_net
# Jalankan: docker-compose up -d --build
# Setup DB: buka http://163.245.208.163:8090/setup.php (hapus setelah selesai)

services:

  # ── Aplikasi PHP ────────────────────────────────────────────────────────
  app:
    build: .
    container_name: bktdrive_app
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - app_storage:/var/www/html/storage
    environment:
      DB_HOST:               mariadb
      DB_NAME:               bktdrive
      DB_USER:               casaos
      DB_PASS:               casaos
      APP_NAME:              BKTDrive
      APP_URL:               http://163.245.208.163:8090
      APP_INTERNAL_URL:      http://163.245.208.163:8090
      ONLYOFFICE_ENABLED:    "true"
      ONLYOFFICE_SERVER:     http://163.245.208.163:7400
      ONLYOFFICE_JWT_SECRET: "PDcxlCnqAgV4fP5izButlqqCeWD8wfPQ"
    networks:
      - bktdrive_net

networks:
  bktdrive_net:
    external: true

volumes:
  app_storage:
