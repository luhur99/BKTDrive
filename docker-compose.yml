version: '3.8'

# BKTDrive — Production Stack (VPS / CasaOS)
# Setup: buat file .env dari .env.example lalu isi nilainya
# Deploy: docker-compose up -d --build
# Update: git pull (tidak perlu rebuild — bind mount aktif)

services:

  # ── MariaDB ───────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: bktdrive_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_secret}
      MYSQL_DATABASE:      ${DB_NAME:-bktdrive}
      MYSQL_USER:          ${DB_USER:-bktdrive}
      MYSQL_PASSWORD:      ${DB_PASS:-bktdrive}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bktdrive_net

  # ── OnlyOffice Document Server ────────────────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver
    container_name: bktdrive_onlyoffice
    restart: unless-stopped
    ports:
      - "7400:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET:  ${ONLYOFFICE_JWT_SECRET:-changeme}
    networks:
      - bktdrive_net

  # ── Aplikasi PHP ──────────────────────────────────────────────────────────
  app:
    build: .
    container_name: bktdrive_app
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html            # bind-mount: git pull langsung aktif
      - app_storage:/var/www/html/storage
    environment:
      DB_HOST:               mariadb
      DB_NAME:               ${DB_NAME:-bktdrive}
      DB_USER:               ${DB_USER:-bktdrive}
      DB_PASS:               ${DB_PASS:-bktdrive}
      APP_NAME:              ${APP_NAME:-BKTDrive}
      APP_URL:               ${APP_URL:-http://localhost:8090}
      APP_INTERNAL_URL:      http://app
      ONLYOFFICE_ENABLED:    ${ONLYOFFICE_ENABLED:-true}
      ONLYOFFICE_SERVER:     ${ONLYOFFICE_SERVER:-http://localhost:7400}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-changeme}
    depends_on:
      - mariadb
      - onlyoffice
    networks:
      - bktdrive_net

networks:
  bktdrive_net:
    driver: bridge

volumes:
  app_storage:
  db_data:
